<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Stade Brestois Shop</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>

  
    <div class="banner">
      <div class="container">
        <h1>Stade Brestois 29</h1>
        <h2>La boutique officielle des supporters</h2>
        <a href="#apply-section" class="btn-red">Acheter maintenant</a>
      </div>
    </div>

 
    <div class="cards-container">

      <div class="card">
        <h2>MAILLOT</h2>
        <img src="images/maillot.png" alt="">
        <h3>Maillot Domicile 2025</h3>
        <a href="#apply-section" class="btn-red">Acheter</a>
      </div>

      <div class="card">
        <h2>ÉCHARPE</h2>
        <img src="images/écharpe.png" alt="">
        <h3>Écharpe Officielle</h3>
        <a href="#apply-section" class="btn-red">Acheter</a>
      </div>

      <div class="card">
        <h2>BALLON</h2>
        <img src="images/ballon.png" alt="">
        <h3>Ballon Collector</h3>
        <a href="#apply-section" class="btn-red">Acheter</a>
      </div>

    </div>

    <div class="avatar-section">
      <h2>À propos du fondateur</h2>
      <img src="images/avatar.jpg" class="avatar" alt="Avatar">
      <p>Quentin, supporter passionné du Stade Brestois.</p>
    </div>

    <div id="apply-section">
      <div data-tf-live="01KMRDYS0MS44DEJF247WD2P70"></div>
      <script src="//embed.typeform.com/next/embed.js"></script>
    </div>

  </body>
</html>
